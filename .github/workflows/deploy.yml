name: Deploy POS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Fuerza el runtime Node 24 en TODAS las actions JS (incl. pnpm/action-setup),
      # independientemente de su versión fijada. Opt-in oficial de GitHub ante la
      # deprecación de Node 20. Se puede quitar cuando todas publiquen sobre Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_APISNET_TOKEN: ${{ secrets.VITE_APISNET_TOKEN }}
          VITE_DEFAULT_STORE_ID: ${{ vars.VITE_DEFAULT_STORE_ID }}
          VITE_USE_MEILI_SEARCH: ${{ vars.VITE_USE_MEILI_SEARCH }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/pos/
